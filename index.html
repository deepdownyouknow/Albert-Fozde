<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Főzde — recepttervező</title>
<meta name="theme-color" content="#17130E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Főzde">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#17130E; --panel:#211B13; --panel2:#2A2318; --border:#3A3122; --border2:#4A3F2C;
  --text:#EFE7D6; --muted:#A2957B; --dim:#6E6350;
  --gold:#E5A63C; --gold-soft:#8A6A2E; --green:#94A85A; --red:#C96A4A; --copper:#C97C4A;
  --radius:10px;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
body.light{
  --bg:#F4EDDD; --panel:#FCF8EE; --panel2:#EFE6D2; --border:#DCD0B6; --border2:#C6B896;
  --text:#2A2318; --muted:#6E6350; --dim:#9A8C70;
  --gold:#B57A16; --gold-soft:#C9A45C; --copper:#A65E32;
}
body.light .btn.primary,body.light .tab.on{background:#E5A63C;border-color:#D69526;color:#1C1509}
body.light .timerbar{border-top-color:#B57A16}
body.light .fchart svg text{fill:#6E6350}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{background:radial-gradient(900px 420px at 18% -8%, rgba(229,166,60,.08), transparent 60%), radial-gradient(700px 320px at 85% -5%, rgba(201,124,74,.06), transparent 55%), var(--bg);color:var(--text);font-family:var(--body);font-size:14px;min-height:100vh}
button{font-family:var(--body);cursor:pointer}
input,select,textarea{font-family:var(--body);color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:13px;outline:none;min-width:0;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input[type=number]{font-family:var(--mono);text-align:right}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
a{color:var(--gold)}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 90px}
header.top{display:flex;align-items:center;gap:10px;padding:16px 0 12px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.logo{font-family:var(--display);font-weight:800;font-size:24px;letter-spacing:-.5px;color:var(--gold);display:flex;align-items:center;gap:9px}
.logo svg{width:24px;height:24px;flex:none}
.logo small{font-family:var(--body);font-weight:500;font-size:12px;color:var(--dim);letter-spacing:.2px;margin-top:6px}
.spacer{flex:1}
.btn{background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:border-color .15s, background .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold)}
.btn.primary{background:var(--gold);color:#1C1509;border-color:var(--gold)}
.btn.primary:hover{background:#F0B653}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--text)}
.btn.danger:hover{border-color:var(--red);color:var(--red)}
.btn.small{padding:5px 10px;font-size:12px;border-radius:6px}
/* ---------- lista ---------- */
.list-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
h1{font-family:var(--display);font-weight:700;font-size:21px}
.count{color:var(--dim);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:15px;display:flex;gap:14px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--gold-soft)}
.glass{flex:none}
.card h3{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .style{color:var(--muted);font-size:12px;margin-bottom:10px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px;white-space:nowrap}
.chip b{color:var(--text);font-weight:600}
.card .body{min-width:0;flex:1}
.empty{border:1px dashed var(--border2);border-radius:var(--radius);padding:56px 20px;text-align:center;color:var(--muted)}
.empty p{margin-top:6px;font-size:13px;color:var(--dim)}
/* ---------- szerkesztő ---------- */
.ed-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.name-input{font-family:var(--display);font-weight:700;font-size:22px;background:transparent;border:1px solid transparent;padding:4px 8px;flex:1;min-width:200px}
.name-input:hover{border-color:var(--border)}
.name-input:focus{border-color:var(--gold);background:var(--bg)}
.save-state{font-size:12px;color:var(--dim);min-width:56px}
.meta-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.meta-row input{flex:1;min-width:150px;max-width:240px}
.statbar{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow-x:auto;scrollbar-width:thin}
.stat{padding:12px 16px;border-right:1px solid var(--border);min-width:84px;flex:none}
.stat:last-child{border-right:none}
.stat .lab{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--dim);margin-bottom:3px;white-space:nowrap}
.stat .val{font-family:var(--mono);font-weight:600;font-size:16px;white-space:nowrap}
.stat .val small{font-size:10px;color:var(--muted);font-weight:400}
.stat.color-stat{display:flex;gap:10px;align-items:center}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.panel > .ph{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}
.panel > .ph h2{font-family:var(--display);font-size:14px;font-weight:700}
.panel > .ph .sum{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;margin-left:auto}
.panel .pb{padding:12px 14px 14px}
/* sor-alapú hozzávaló-lista */
.rows{display:flex;flex-direction:column;gap:8px}
.irow{display:grid;grid-template-columns:var(--cols);gap:6px;align-items:end}
.fld{display:flex;flex-direction:column;gap:2px;min-width:0}
.flab{font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--dim);font-weight:600;white-space:nowrap;overflow:hidden}
.irow:not(:first-child) .flab{display:none}
.calcv{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right;padding:8px 4px;white-space:nowrap}
.fld-rm button{background:none;border:1px solid transparent;color:var(--dim);font-size:17px;padding:5px 8px;border-radius:6px;line-height:1}
.fld-rm button:hover{color:var(--red);background:var(--bg)}
.addrow{margin-top:10px}
.kv{display:grid;grid-template-columns:1fr 120px;gap:8px 10px;align-items:center}
.kv label{font-size:12px;color:var(--muted)}
.kv .unit-in{display:flex;align-items:center;gap:6px}
.kv .unit-in span{font-size:11px;color:var(--dim);font-family:var(--mono);flex:none}
.water-grid{display:grid;grid-template-columns:1fr auto;gap:6px 14px;font-size:13px}
.water-grid .wl{color:var(--muted)}
.water-grid .wv{font-family:var(--mono);font-weight:600;text-align:right}
textarea{min-height:90px;resize:vertical;line-height:1.5}
.modal-bg{position:fixed;inset:0;background:rgba(10,8,5,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:12px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
.modal .ph{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal .ph h2{font-family:var(--display);font-size:16px}
.modal .pb{padding:16px 18px}
.modal .pf{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.hint{font-size:12px;color:var(--dim);line-height:1.5;margin-top:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold-soft);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
/* ---------- stílus-műszerfal (manométerek) ---------- */
.gauges{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px}
.gauge{text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 4px 12px}
.gauge svg{width:100%;max-width:112px;height:auto;display:block;margin:0 auto}
.gval{font-family:var(--mono);font-weight:600;font-size:20px;color:var(--gold);margin-top:-4px}
.gout .gval{color:#E8907A}
.glab{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-top:3px;font-weight:600}
.gout .glab{color:#B06A55}
.grange{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px}
.gout .grange{color:#C98A75}
/* ---------- címke-stílusú kártyák, kereső, erjedési grafikon ---------- */
.card{padding:14px 16px 14px 14px;gap:12px}
.band{width:10px;align-self:stretch;border-radius:5px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.4), inset -3px 0 6px rgba(0,0,0,.3)}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:2px;min-width:0}
.card-top h3{margin:0;flex:1}
.stybadge{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--copper);border:1px solid var(--copper);border-radius:5px;padding:1px 6px;flex:none;letter-spacing:.5px}
.cstats{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.2px;line-height:1.5}
.days{font-size:11px;color:var(--dim)}
.filter-row{margin-bottom:14px;max-width:360px}
.fchart{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:12px}
/* ---------- fülek, főzetek, kalkulátor, könyvtár ---------- */
.tabs{display:flex;gap:6px}
.tab{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:7px 16px;border-radius:8px;font-weight:600;font-size:13px}
.tab.on{background:var(--gold);border-color:var(--gold);color:#1C1509}
.status{font-family:var(--mono);font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:2px 9px;border-radius:10px;border:1px solid var(--border2);color:var(--muted)}
.status.erjed{color:#C9D89B;border-color:#5A6B36;background:rgba(148,168,90,.12)}
.status.kesz{color:var(--gold);border-color:var(--gold-soft);background:rgba(229,166,60,.1)}
.stars span{font-size:20px;color:var(--dim);cursor:pointer;padding:0 2px;user-select:none}
.stars .on{color:var(--gold)}
.stars.ro span{cursor:default;font-size:13px}
.check-list{display:flex;flex-direction:column;gap:6px}
.chk{display:flex;align-items:center;gap:10px;font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 10px;cursor:pointer}
.chk input{width:auto;accent-color:var(--gold);flex:none}
.chk span{flex:1;line-height:1.4}
.chk.done span{color:var(--dim);text-decoration:line-through}
.chk .btn{flex:none}
.timerbar{position:fixed;bottom:0;left:0;right:0;background:var(--panel2);border-top:2px solid var(--gold);display:flex;gap:14px;align-items:center;justify-content:center;padding:10px 16px;z-index:70}
.timerbar b{font-family:var(--mono);font-size:22px;color:var(--gold)}
.timerbar span{font-size:13px;color:var(--muted);max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.calc-sec{border-top:1px solid var(--border);padding-top:12px;margin-top:12px}
.calc-sec:first-child{border-top:none;padding-top:0;margin-top:0}
.calc-sec h3{font-family:var(--display);font-size:13px;color:var(--gold);margin-bottom:8px}
.cres{font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:600}
.librow{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.librow:last-child{border-bottom:none}
.librow .body{flex:1;min-width:0}
.librow h4{font-family:var(--display);font-size:14px}
.librow .ls{font-size:11px;color:var(--muted);font-family:var(--mono)}
.modal.wide{max-width:600px}
/* ---------- stíluskalauz ---------- */
.style-panel .pb{display:flex;flex-direction:column;gap:7px}
.srow{display:flex;align-items:center;gap:10px}
.slab{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);background:var(--panel2);border:1px solid var(--border2);border-radius:4px;padding:4px 0;width:58px;text-align:center;flex:none}
.slab.out{color:#FFD9CC;background:#5E2C1F;border-color:#8A4534}
.sbar{position:relative;flex:1;height:26px;background:var(--bg);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.sfill{position:absolute;top:0;bottom:0;background:#49572F;display:flex;justify-content:space-between;align-items:center;padding:0 7px}
.sfill span{font-family:var(--mono);font-size:10px;color:#C9D3AB;opacity:.9}
.smark{position:absolute;top:0;bottom:0;width:3px;background:var(--gold);transform:translateX(-1.5px);box-shadow:0 0 6px rgba(229,166,60,.6)}
.scur{position:absolute;top:50%;transform:translate(7px,-50%);font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);text-shadow:0 1px 3px #000,0 0 5px #000}
.scur.flip{transform:translate(calc(-100% - 7px),-50%)}
/* ---------- malátaösszetétel sáv ---------- */
.maltbar{display:flex;height:14px;border-radius:7px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.maltbar:empty{display:none}
.mseg{min-width:3px}
/* ---------- komló grafikon ---------- */
.hopchart{display:flex;flex-direction:column;gap:6px;margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.hrow2{display:flex;align-items:center;gap:8px;font-size:11px}
.hname{width:110px;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}
.htrack{flex:1;height:10px;background:var(--bg);border-radius:5px;overflow:hidden}
.hfill{height:100%;border-radius:5px}
.hval{font-family:var(--mono);color:var(--muted);flex:none;font-size:10px;width:96px;text-align:right}
.hlegend{display:flex;gap:14px;font-size:10px;color:var(--dim);margin-top:3px;flex-wrap:wrap}
.hlegend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px}
/* ---------- panel-polírozás ---------- */
.panel > .ph{background:rgba(0,0,0,.18);border-radius:var(--radius) var(--radius) 0 0}
.panel > .ph svg{width:15px;height:15px;color:var(--gold);flex:none}
.statbar{position:relative}
.statbar::after{content:'';position:absolute;top:0;left:0;height:2px;width:100%;min-width:800px;background:linear-gradient(90deg,var(--gold) 0%,rgba(229,166,60,.12) 65%,transparent 100%);pointer-events:none}
.meta-row select{flex:1;min-width:170px;max-width:280px}
/* ================= MOBIL ================= */
@media(max-width:900px){
  .cols{grid-template-columns:1fr}
}
@media(max-width:640px){
  .wrap{padding:0 12px 90px}
  input,select,textarea{font-size:16px;padding:10px}
  .btn{padding:11px 15px}
  .btn.small{padding:8px 12px;font-size:13px}
  header.top .btn{flex:1}
  .logo{width:100%;justify-content:center;margin-bottom:4px}
  .grid{grid-template-columns:1fr}
  .name-input{font-size:19px;min-width:140px}
  .meta-row input{max-width:none}
  /* statbar: rácsba tördelve, nem görgetve */
  .statbar{display:grid;grid-template-columns:repeat(3,1fr);overflow:visible}
  .stat{border-right:none;border-bottom:1px solid var(--border);min-width:0;padding:10px 12px}
  .stat.color-stat{grid-column:1/-1;justify-content:flex-start}
  .statbar .stat:nth-last-child(-n+2){border-bottom:none}
  /* sorok: név felül, számmezők alatta címkével */
  .irow{grid-template-columns:repeat(6,1fr) !important;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;gap:8px}
  .irow input,.irow select{background:var(--panel)}
  .fld-name{grid-column:span 5}
  .fld-rm{grid-column:span 1;align-items:flex-end}
  .fld-rm button{font-size:20px;padding:8px 12px}
  .fld{grid-column:span 2}
  .fld-w3{grid-column:span 3}
  .flab{display:flex !important;font-size:10px}
  .calcv{text-align:left;padding:10px 2px}
  .kv{grid-template-columns:1fr 130px}
}
@media(max-width:640px){
  .hname{width:80px}
  .hval{width:auto}
  .slab{width:50px;font-size:10px}
  .meta-row select{max-width:none}
  .statbar::after{min-width:0}
  .chk{font-size:14px}
  .timerbar b{font-size:19px}
}
@media (prefers-reduced-motion: reduce){*{transition:none !important}}
@media print{
  html,body{background:#fff !important;color:#111}
  header.top,.btn,.tabs,.save-state,.filter-row,.addrow,.fld-rm,.toast,.timerbar{display:none !important}
  .wrap{max-width:none;padding:0}
  .panel,.statbar{background:#fff;border-color:#bbb;color:#111;break-inside:avoid}
  .panel > .ph{background:#f2f2f2}
  .panel > .ph h2,.stat .val,.wv,.name-input,.scur{color:#111}
  .statbar::after{display:none}
  input,select,textarea{background:#fff;border-color:#ccc;color:#111}
  .flab,.stat .lab,.kv label,.wl,.calcv,.sum{color:#555}
  .sfill{background:#e2ead0}
  .sfill span{color:#4a5a2a}
  .slab{background:#eee;border-color:#ccc;color:#111}
  .irow{background:#fff}
  .maltbar{border-color:#ccc}
}

</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 4h9v3h2.5A2.5 2.5 0 0 1 20 9.5v4A2.5 2.5 0 0 1 17.5 16H15v4H6V4Z" stroke="currentColor" stroke-width="1.8"/><path d="M15 8.5h2.2a1 1 0 0 1 1 1v3.5a1 1 0 0 1-1 1H15" stroke="currentColor" stroke-width="1.4"/><path d="M9 8v9M12 8v9" stroke="currentColor" stroke-width="1.4" opacity=".6"/></svg>
      Főzde <small id="tagline">recepttervező</small>
    </div>
    <div class="spacer"></div>
    <button class="btn ghost" id="btn-export" title="Az összes recept mentése JSON fájlba">Mentés fájlba</button>
    <button class="btn ghost" id="btn-import">Betöltés fájlból</button>
    <button class="btn ghost" id="btn-theme" title="Téma / Theme">☀</button>
    <button class="btn ghost" id="btn-lang" title="Nyelv / Language">EN</button>
    <button class="btn" id="btn-settings">⚙ Felszerelés</button>
  </header>
  <main id="app"></main>
</div>
<input type="file" id="import-file" accept=".json,.xml,.beerxml" style="display:none">
<div class="toast" id="toast"></div>

<script>
/* ================= adat / állandók ================= */

const DEFAULT_SETTINGS = {
  batchL: 21, boilMin: 30, brewhouseEff: 70, mashEff: 80,
  boiloffLph: 3.5, kettleLossL: 4, absorpLkg: 0.55, deadspaceL: 0.75,
  mashThickness: 4.4
};

const MALTS = [
  ["Pale Malt, Maris Otter",5,82],["Pilsner (Weyermann)",3.5,81],["Pale Ale (Weyermann)",6,81],
  ["Extra Pale (Golden Promise)",4,82],["Munich I (Weyermann)",14,80],["Munich II (Weyermann)",21,80],
  ["Vienna (Weyermann)",8,80],["Wheat Malt, Pale (Weyermann)",4,82],["Carapils/Carafoam",4,75],

let recipes = [];

/* mentés: először a Claude-tároló, ha az nincs vagy hibázik, a böngésző saját tárolója */
async function storGet(k){
  try{
    if(typeof window!=='undefined' && window.storage && window.storage.get){
      const r = await window.storage.get(k);
      if(r && r.value!=null) return r.value;
    }
  }catch(e){ /* nincs ilyen kulcs vagy nem elérhető — próbáljuk a következőt */ }
  try{ return localStorage.getItem(k); }catch(e){ return null; }
}
async function storSet(k,v){
  try{
    if(typeof window!=='undefined' && window.storage && window.storage.set){
      const r = await window.storage.set(k,v);
      if(r) return true;
    }
  }catch(e){}
  try{ localStorage.setItem(k,v); return true; }catch(e){}
  return false;
}
async function loadAll(){
  try{
    const r = await storGet('fozde-recipes'); if(r) recipes = JSON.parse(r);
    const b = await storGet('fozde-batches'); if(b) batches = JSON.parse(b);
    const u = await storGet('fozde-ui'); if(u) ui = {...ui, ...JSON.parse(u)};
    const s = await storGet('fozde-settings'); if(s) settings = {...DEFAULT_SETTINGS, ...JSON.parse(s)};
  }catch(e){ storageOk=false; }
}
let saveTimer=null;
function scheduleSave(){
  setSaveState('…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAll, 700);
}
async function saveAll(){
  const ok1 = await storSet('fozde-recipes', JSON.stringify(recipes));
  const ok2 = await storSet('fozde-settings', JSON.stringify(settings));
  const ok3 = await storSet('fozde-batches', JSON.stringify(batches));
  setSaveState(ok1 && ok2 && ok3 ? 'Mentve' : 'Mentés sikertelen');
}

/* ================= számítások ================= */
const sgToPlato = sg => -616.868 + 1111.14*sg - 630.272*sg*sg + 135.997*sg*sg*sg;

function calc(r){
  const g = r.equip;
  const grains = r.fermentables.filter(f=>+f.amount>0);
  const totalKg = grains.reduce((s,f)=>s + (+f.amount||0),0);
  let ptsBH = 0, ptsMash = 0, mcu = 0;
  for(const f of grains){
    const kg=+f.amount||0, pot=(+f.potential||80)/100, ebc=+f.ebc||0;
    const raw = kg * pot * 383.89;
    const isSugar = pot>=0.96; /* cukorfélékre nincs hatásfok */
    ptsBH += raw * (isSugar ? 1 : g.brewhouseEff/100);
    ptsMash += raw * (isSugar ? 1 : g.mashEff/100);
    mcu += kg * (ebc/1.97) * 8.3454;
  }
  /* OG az erjesztőben: főzőházi hatásfok */
  const og = 1 + (ptsBH / Math.max(g.batchL,0.1)) / 1000;
  mcu = mcu / Math.max(g.batchL,0.1);
  const srm = mcu>0 ? 1.4922*Math.pow(mcu,0.6859) : 0;
  const ebc = srm*1.97;
  const preBoilL = g.batchL + g.boiloffLph*(g.boilMin/60) + g.kettleLossL;
  const totalWater = preBoilL + totalKg*g.absorpLkg + g.deadspaceL;
  let mashWater = Math.min(totalKg*g.mashThickness, totalWater);
  if(totalKg===0) mashWater = 0;
  const spargeWater = Math.max(totalWater - mashWater, 0);
  const mashVol = mashWater + totalKg*0.67;
  /* forralás előtti gravity: cefre-hatásfok a forralás előtti térfogatra */
  const preBoilOg = 1 + (ptsMash / Math.max(preBoilL,0.1))/1000;
  const att = r.yeasts.length ? Math.max(...r.yeasts.map(y=>+y.attenuation||75)) : 75;
  const fg = og - (og-1)*(att/100);
  const abv = (og-fg)*131.25;
  let ibu = 0;
  const hopRows = r.hops.map(h=>{
    const gr=+h.amount||0, aa=(+h.alpha||0)/100;
    let hIbu = 0;
    if(h.use!=='dry' && gr>0 && aa>0){
      const t = +h.time||0;
      const bigness = 1.65*Math.pow(0.000125, og-1);
      const timeF = (1-Math.exp(-0.04*t))/4.15;
      let util = bigness*timeF;
      if(h.use==='hopstand'){
        const temp = +r.hopstandTemp||80;
        util *= Math.exp(-0.076*(100-Math.min(temp,100)));
      }
      hIbu = aa*gr*1000/Math.max(g.batchL,0.1)*util;
    }
    ibu += hIbu;
    return hIbu;
  });
  const totalHopG = r.hops.reduce((s,h)=>s+(+h.amount||0),0);
  const dryHopG = r.hops.filter(h=>h.use==='dry').reduce((s,h)=>s+(+h.amount||0),0);
  const oe=sgToPlato(og), ae=sgToPlato(fg);
  const re = 0.1808*oe + 0.8192*ae;
  const abw = abv*0.789/fg;
  const carbs100 = Math.max(re*fg,0);
  const kcal100 = Math.max(abw*7 + carbs100*4, 0)*fg;
  const bugu = og>1 ? ibu/((og-1)*1000) : 0;
  return {og,fg,abv,ibu,ebc,srm,bugu,totalKg,totalHopG,dryHopG,preBoilL,preBoilOg,
          totalWater,mashWater,spargeWater,mashVol,att,hopRows,kcal100,carbs100};
}

function gaugeSvg(label, val, lo, hi, fmt){
  const span=(hi-lo)||Math.abs(hi)*0.1||1, pad=0.18;
  const rlo=lo-span*pad, rhi=hi+span*pad;
  let f=(val-rlo)/(rhi-rlo); f=Math.max(0,Math.min(1,f));
  const inR = val>=lo-1e-9 && val<=hi+1e-9;
  const cx=60, cy=64, r=44;
  const A=t=>210-240*t;
  const P=(a,rr)=>[cx+rr*Math.cos(a*Math.PI/180), cy-rr*Math.sin(a*Math.PI/180)];
  const arc=(a0,a1,rr)=>{
    const p0=P(a0,rr), p1=P(a1,rr);
    const la=(a0-a1)>180?1:0;
    return `M ${p0[0].toFixed(1)} ${p0[1].toFixed(1)} A ${rr} ${rr} 0 ${la} 1 ${p1[0].toFixed(1)} ${p1[1].toFixed(1)}`;
  };
  const fLo=pad/(1+2*pad), fHi=(1+pad)/(1+2*pad);
  const n=P(A(f), r-9);
  const needle = inR ? 'var(--gold)' : '#E06A4A';
  /* kis skálavonalak */
  let ticks='';
  for(let i=0;i<=8;i++){
    const a=A(i/8);
    const t0=P(a,r-4), t1=P(a,r+0.5);
    ticks+=`<line x1="${t0[0].toFixed(1)}" y1="${t0[1].toFixed(1)}" x2="${t1[0].toFixed(1)}" y2="${t1[1].toFixed(1)}" stroke="#5C5140" stroke-width="1"/>`;
  }
  return `<div class="gauge${inR?'':' gout'}">
    <svg viewBox="0 0 120 92">
      <path d="${arc(210,-30,r)}" fill="none" stroke="#332B1E" stroke-width="7" stroke-linecap="round"/>
      <path d="${arc(A(fLo),A(fHi),r)}" fill="none" stroke="#5A6B36" stroke-width="7" stroke-linecap="round"/>
      ${ticks}
      <line x1="${cx}" y1="${cy}" x2="${n[0].toFixed(1)}" y2="${n[1].toFixed(1)}" stroke="${needle}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="4.5" fill="var(--panel2)" stroke="${needle}" stroke-width="2"/>
    </svg>
    <div class="gval">${fmt(val)}</div>
    <div class="glab">${label}</div>
    <div class="grange">${t('cél')}: ${fmt(lo)} – ${fmt(hi)}</div>
  </div>`;
}
function styleGuideRows(r,c){
  const st=STYLES.find(s=>s[0]===r.styleId);
  if(!st) return '';
  const a1=st[2],a2=st[3],o1=st[4],o2=st[5],f1=st[6],f2=st[7],i1=st[8],i2=st[9],e1=st[10],e2=st[11];
  return '<div class="gauges">'
   + gaugeSvg('ABV',c.abv,a1,a2,v=>v.toFixed(1)+'%')
   + gaugeSvg('OG',c.og,o1,o2,fmtSg)
   + gaugeSvg('FG',c.fg,f1,f2,fmtSg)
   + gaugeSvg('EBC',c.ebc,e1,e2,v=>fmt1(v))
   + gaugeSvg('IBU',c.ibu,i1,i2,v=>String(Math.round(v)))
   + gaugeSvg('BU/GU',c.bugu,i1/((o2-1)*1000),i2/((o1-1)*1000),v=>v.toFixed(2))
   + '</div>';
}
function styleGuideHtml(r,c){
  const st=STYLES.find(s=>s[0]===r.styleId);

}

function hopChartHtml(r,c){
  const hs=r.hops.filter(h=>+h.amount>0);
  if(!hs.length) return '';
  const max=Math.max(...hs.map(h=>+h.amount));
  const useColor={boil:'#94A85A',hopstand:'#E5A63C',dry:'#7FA8C9'};
  const useLab={boil:'forralás',hopstand:'hopstand',dry:'szárazkomló'};
  const rows=hs.map(h=>{
    const w=Math.max((+h.amount)/max*100,4);
    const t=h.use==='dry'?((+h.time||0)+' nap'):((+h.time||0)+' perc');
    return `<div class="hrow2"><span class="hname">${esc(h.name)||'—'}</span>
      <div class="htrack"><div class="hfill" style="width:${w}%;background:${useColor[h.use]||'#94A85A'}"></div></div>
      <span class="hval">${+h.amount} g · ${t}</span></div>`;
  }).join('');
  const legend=`<div class="hlegend">${Object.keys(useColor).map(k=>`<span><i style="background:${useColor[k]}"></i>${useLab[k]}</span>`).join('')}</div>`;
  return `<div class="hopchart">${rows}${legend}</div>`;
}

function setPath(obj, path, val){
  const parts = path.split('.');
  let o = obj;
  for(let i=0;i<parts.length-1;i++) o = o[parts[i]];
  o[parts[parts.length-1]] = val;
}

function wireEdit(r){
  document.getElementById('btn-back').onclick = ()=>{ view={name:'list'}; render(); };
  document.getElementById('btn-dup').onclick = ()=>{
    const copy = JSON.parse(JSON.stringify(r));
    copy.id = 'r'+Date.now(); copy.created = Date.now(); copy.name = r.name+' '+t('(másolat)');
    recipes.push(copy); scheduleSave(); view={name:'edit',id:copy.id}; render();
    toast(t('Recept duplikálva'));
  };
  document.getElementById('btn-del').onclick = ()=>{
    if(confirm(t('Biztos törlöd a receptet:')+' '+r.name+'?')){
      recipes = recipes.filter(x=>x.id!==r.id); scheduleSave(); view={name:'list'}; render();
      toast(t('Recept törölve'));
    }
  };
  document.getElementById('btn-brew').onclick = ()=>{
    const b = newBatchFrom(r);
    batches.push(b); scheduleSave();
    view={name:'batch', id:b.id}; render();
    toast(t('Főzet létrehozva — a recept pillanatképe elmentve'));
  };
  document.getElementById('btn-shop').onclick = ()=>openShoplist(r);
  document.getElementById('btn-print').onclick = ()=>window.print();
  const styleSel = document.getElementById('style-select');
  if(styleSel){
    styleSel.addEventListener('change', ()=>{
      const id = styleSel.value;
      r.styleId = id;
      if(id){ const st=STYLES.find(s=>s[0]===id); r.style = st[0]+' '+st[1]; }
      scheduleSave(); renderEdit();
    });
  }
  app.querySelectorAll('[data-f]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const isNum = inp.type==='number';
      setPath(r, inp.dataset.f, isNum ? (inp.value===''?'':+inp.value) : inp.value);
      autoFill(r, inp);
      scheduleSave();
      refreshCalcOnly(r);
    });
    inp.addEventListener('change', ()=>{
      /* mobil billentyűzetnél a change minden fókuszvesztésre lefut —
         csak akkor rajzolunk újra, ha tényleg kell (select, preset-név) */
      if(inp.tagName==='SELECT' || /\.name$/.test(inp.dataset.f)) renderEdit();
      else refreshRowCalcs(r);
    });
  });
  app.querySelectorAll('[data-rm]').forEach(btn=>{
    btn.onclick = ()=>{
      const [arr,idx] = btn.dataset.rm.split('.');
      r[arr].splice(+idx,1); scheduleSave(); renderEdit();
    };
  });
  app.querySelectorAll('[data-add]').forEach(btn=>{
    btn.onclick = ()=>{
      const a = btn.dataset.add;
      if(a==='fermentables') r.fermentables.push({name:'',amount:'',ebc:4,potential:81});
      if(a==='hops') r.hops.push({name:'',amount:'',alpha:12,use:'boil',time:10});
      if(a==='yeasts') r.yeasts.push({name:'',amount:1,attenuation:78});
      if(a==='misc') r.misc.push({name:'',amount:'',when:'Forralás'});
      if(a==='mashSteps') r.mashSteps.push({name:'Lépés',temp:66,time:15});
      if(a==='fermSteps') r.fermSteps.push({name:'Szakasz',temp:20,days:3});
      scheduleSave(); renderEdit();
      const inputs = app.querySelectorAll(`[data-f^="${a}."][data-f$=".name"]`);
      if(inputs.length) inputs[inputs.length-1].focus();
    };
  });
}

function autoFill(r, inp){
  const p = inp.dataset.f;
  const m = p.match(/^(fermentables|hops|yeasts)\.(\d+)\.name$/);
  if(!m) return;
  const arr=m[1], idx=m[2];
  const name = inp.value;
  if(arr==='fermentables'){ const hit=MALTS.find(x=>x[0]===name); if(hit){ r.fermentables[idx].ebc=hit[1]; r.fermentables[idx].potential=hit[2]; } }
  if(arr==='hops'){ const hit=HOPS.find(x=>x[0]===name); if(hit){ r.hops[idx].alpha=hit[1]; } }
  if(arr==='yeasts'){ const hit=YEASTS.find(x=>x[0]===name); if(hit){ r.yeasts[idx].attenuation=hit[1]; } }
}

/* fókuszvesztéskor a soron belüli számított cellák (arány, IBU) is frissülnek */
function refreshRowCalcs(r){
  const c = calc(r);
  refreshCalcOnly(r);
  const fCalcs = app.querySelectorAll('[data-f^="fermentables."][data-f$=".amount"]');
  fCalcs.forEach(inp=>{
    const i = +inp.dataset.f.split('.')[1];
    const row = inp.closest('.irow');
    const cv = row && row.querySelector('.calcv');
    if(cv){
      const pct = c.totalKg>0 ? ((+r.fermentables[i].amount||0)/c.totalKg*100) : 0;
      cv.textContent = pct.toFixed(1)+'%';
    }
  });
  const hCalcs = app.querySelectorAll('[data-f^="hops."][data-f$=".amount"]');
  hCalcs.forEach(inp=>{
    const i = +inp.dataset.f.split('.')[1];
    const row = inp.closest('.irow');
    const cv = row && row.querySelector('.calcv');
    if(cv) cv.textContent = r.hops[i].use==='dry' ? '—' : c.hopRows[i].toFixed(1);
  });
}

/* ---------- főzetek (batch) ---------- */
function newBatchFrom(r){
  return {
    id:'b'+Date.now()+Math.random().toString(36).slice(2,6),
    recipeId:r.id, name:r.name,
    date:new Date().toISOString().slice(0,10),
    status:'tervezett',
    snapshot:JSON.parse(JSON.stringify(r)),
    measured:{preBoil:'',og:'',fg:'',vol:''},
    rating:0, notes:'', checks:{}, readings:[]
  };
}
function batchCalc(b){
  const snap=b.snapshot, c=calc(snap);
  const og=+b.measured.og||0, fg=+b.measured.fg||0;
  const vol=+b.measured.vol||snap.equip.batchL;
  const abv=(og>1&&fg>=1&&og>fg)?(og-fg)*131.25:null;
  const att=(og>1&&fg>=1&&og>fg)?((og-fg)/(og-1)*100):null;
  let eff=null;
  if(og>1){
    let rawGrain=0, sugar=0;
    for(const f of snap.fermentables){
      const kg=+f.amount||0, pot=(+f.potential||80)/100;
      const raw=kg*pot*383.89;
      if(pot>=0.96) sugar+=raw; else rawGrain+=raw;
    }
    if(rawGrain>0) eff=(((og-1)*1000*vol)-sugar)/rawGrain*100;
  }
  return {plan:c, abv, att, eff};
}
function brewDaySteps(r){
  const c=calc(r); const steps=[];
  steps.push({t:t('Vízbekészítés: ')+fmt2(c.mashWater)+t(' L cefrevíz')+(c.spargeWater>0.1?' + '+fmt2(c.spargeWater)+t(' L csurgatóvíz'):''), m:null});
  r.mashSteps.forEach(s=>steps.push({t:`${s.name}: ${s.temp} °C — ${s.time} ${t('perc')}`, m:+s.time||null}));
  if(c.spargeWater>0.1) steps.push({t:t('Csurgatás (')+fmt2(c.spargeWater)+' L, ~78 °C)', m:null});
  steps.push({t:t('Forralás: ')+r.equip.boilMin+' '+t('perc'), m:+r.equip.boilMin||null});
  r.hops.filter(h=>h.use==='boil').sort((a,b)=>(+b.time)-(+a.time)).forEach(h=>steps.push({t:`${h.amount} g ${h.name} — ${h.time}${t(' perccel a forralás vége előtt')}`, m:null}));
  r.misc.filter(m=>m.when==='Forralás').forEach(m=>steps.push({t:`${m.name} (${m.amount})${t(' a forralásba')}`, m:null}));
  const hst=r.hops.filter(h=>h.use==='hopstand');
  if(hst.length){
    steps.push({t:t('Hűtés ')+(r.hopstandTemp||80)+t(' °C-ra a hopstandhez'), m:null});
    hst.forEach(h=>steps.push({t:t('Hopstand: ')+h.amount+' g '+h.name+' — '+h.time+' '+t('perc'), m:+h.time||null}));
  }
  r.misc.filter(m=>m.when==='Whirlpool').forEach(m=>steps.push({t:`${m.name} (${m.amount})${t(' — whirlpool')}`, m:null}));
  steps.push({t:t('Hűtés erjesztési hőmérsékletre, átfejtés (cél: ')+r.equip.batchL+' L)', m:null});
  if(r.yeasts.length) steps.push({t:t('Élesztő: ')+r.yeasts.map(y=>y.amount+t(' csomag ')+y.name).join(', '), m:null});
  steps.push({t:t('Mért OG felírása a Mért értékek panelbe'), m:null});
  r.hops.filter(h=>h.use==='dry').forEach(h=>steps.push({t:t('Szárazkomló: ')+h.amount+' g '+h.name+' — '+h.time+t(' nap'), m:null}));
  r.misc.filter(m=>m.when==='Erjesztés').forEach(m=>steps.push({t:`${m.name} (${m.amount})${t(' az erjesztőbe')}`, m:null}));
  return steps;
}

function fermChartHtml(b){
  const pts = b.readings.filter(x=>x.date && +x.sg>0).sort((a,c)=>a.date.localeCompare(c.date));
  if(pts.length<2) return '<div class="hint" style="margin:0 0 10px">'+t('Vegyél fel legalább két SG-mérést, és itt kirajzolódik az erjedési görbe.')+'</div>';
  const W=560,H=150,P=40;
  const t0=new Date(pts[0].date).getTime();
  const t1=Math.max(new Date(pts[pts.length-1].date).getTime(), t0+1);
  const sgs=pts.map(p=>+p.sg);
  let lo=Math.min(...sgs), hi=Math.max(...sgs);
  if(hi-lo<0.004){ hi+=0.002; lo-=0.002; }
  const X=t=>P+(W-P-10)*((t-t0)/(t1-t0));
  const Y=v=>10+(H-10-22)*(1-(v-lo)/(hi-lo));
  const line=pts.map(p=>X(new Date(p.date).getTime()).toFixed(1)+','+Y(+p.sg).toFixed(1)).join(' ');
  const dots=pts.map(p=>`<circle cx="${X(new Date(p.date).getTime()).toFixed(1)}" cy="${Y(+p.sg).toFixed(1)}" r="3.5" fill="var(--gold)"/>`).join('');
  const days=Math.round((t1-t0)/86400000);
  return `<div class="fchart"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <text x="2" y="${(Y(hi)+4).toFixed(1)}" font-size="10" fill="#A2957B" font-family="monospace">${hi.toFixed(3)}</text>
    <text x="2" y="${(Y(lo)+4).toFixed(1)}" font-size="10" fill="#A2957B" font-family="monospace">${lo.toFixed(3)}</text>
    <line x1="${P}" y1="${Y(hi).toFixed(1)}" x2="${W-10}" y2="${Y(hi).toFixed(1)}" stroke="#3A3122" stroke-dasharray="3 4"/>
    <line x1="${P}" y1="${Y(lo).toFixed(1)}" x2="${W-10}" y2="${Y(lo).toFixed(1)}" stroke="#3A3122" stroke-dasharray="3 4"/>
    <polyline points="${line}" fill="none" stroke="var(--gold)" stroke-width="2"/>
    ${dots}
    <text x="${W-10}" y="${H-4}" text-anchor="end" font-size="10" fill="#6E6350" font-family="monospace">${days} ${t('nap')}</text>
  </svg></div>`;
}
function openShoplist(r){
  const agg=(arr,key,amt)=>{ const m={}; for(const x of arr){ const n=(x[key]||'').trim(); if(!n) continue; m[n]=(m[n]||0)+(+x[amt]||0); } return Object.entries(m); };
  const f=agg(r.fermentables,'name','amount'), h=agg(r.hops,'name','amount');
  const items=[
    ...f.map(([n,a])=>`${fmt2(a)} kg — ${n}`),
    ...h.map(([n,a])=>`${Math.round(a)} g — ${n}`),
    ...r.yeasts.filter(y=>y.name).map(y=>`${y.amount||1}${t(' csomag ')}— ${y.name}`),
    ...r.misc.filter(m=>m.name).map(m=>`${m.amount||''} — ${m.name}`)
  ];
  const div=document.createElement('div'); div.className='modal-bg';
  div.innerHTML=`<div class="modal"><div class="ph"><h2>${t('Bevásárlólista')} — ${esc(r.name)}</h2><div class="spacer"></div><button class="btn small" id="sh-close">${t('Bezár')}</button></div>
   <div class="pb check-list">${items.map(t=>`<label class="chk"><input type="checkbox"><span>${esc(t)}</span></label>`).join('')||'<div class="hint">'+t('Nincs hozzávaló a receptben.')+'</div>'}</div>
   <div class="pf"><button class="btn" id="sh-copy">${t('Másolás vágólapra')}</button></div></div>`;
  document.body.appendChild(div);
  div.addEventListener('click', e=>{ if(e.target===div) div.remove(); });
  div.querySelector('#sh-close').onclick=()=>div.remove();
  div.querySelectorAll('.chk input').forEach(c=>c.onchange=()=>c.closest('.chk').classList.toggle('done', c.checked));
  div.querySelector('#sh-copy').onclick=()=>{
    const txt=t('Bevásárlólista')+' — '+r.name+String.fromCharCode(10)+items.map(t=>'- '+t).join(String.fromCharCode(10));
    try{ navigator.clipboard.writeText(txt); toast(t('Vágólapra másolva')); }
    catch(e){ toast(t('Nem sikerült másolni')); }
  };
}

/* ---------- időzítő ---------- */
let timerState = null;
function startTimer(min, label){
  stopTimer();
  timerState = {end: Date.now()+min*60000, label, int: setInterval(tickTimer, 500)};
  const d=document.createElement('div');
  d.id='timerbar'; d.className='timerbar';
  d.innerHTML=`<span id="timer-label"></span><b id="timer-left"></b><button class="btn small" id="timer-stop">${t('Leállít')}</button>`;
  document.body.appendChild(d);
  d.querySelector('#timer-stop').onclick = stopTimer;
  tickTimer();
  toast(t('⏱ Időzítő elindítva: ')+min+t(' perc'));
}
function tickTimer(){
  if(!timerState) return;
  const left = timerState.end - Date.now();
  if(left<=0){ beep(); toast(t('⏱ Lejárt: ')+timerState.label); stopTimer(); return; }
  const s=Math.ceil(left/1000);
  const l=document.getElementById('timer-label'), v=document.getElementById('timer-left');
  if(l) l.textContent = timerState.label;
  if(v) v.textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}
function stopTimer(){
  if(timerState){ clearInterval(timerState.int); timerState=null; }
  const d=document.getElementById('timerbar'); if(d) d.remove();
}
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.4,0.8].forEach(t=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(0.3, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.35);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.37);
    });
  }catch(e){}
}

/* ---------- kalkulátorok ---------- */
function hydroCorr(sg, tC, calC){
  const F=c=>c*9/5+32;
  const k=x=>1.00130346 - 1.34722124e-4*x + 2.04052596e-6*x*x - 2.32820948e-9*x*x*x;
  return sg * k(F(tC)) / k(F(calC));
}
function brixToSg(bx){ return 1 + bx/(258.6 - (bx/258.2)*227.1); }

    const L=num('c-p-l'), tv=num('c-p-vol'), tc=num('c-p-t');

      const res=Math.max(3.0378 - 0.050062*tf + 0.00026555*tf*tf, 0);
      const g=Math.max(4.0*(tv-res)*L, 0);

    const wl=num('c-s-l');
    if(wl>0){
      const gy=num('c-s-gy')/wl, cc=num('c-s-cc')/wl, ep=num('c-s-ep')/wl, na=num('c-s-na')/wl;
      const Ca=gy*232.8+cc*272.6, SO4=gy*557.7+ep*389.6, Cl=cc*482.3+na*606.7, Mg=ep*98.6, Na=na*393.4;

    } else $('c-s-res').innerHTML='';
  }
  div.querySelectorAll('input').forEach(i=>i.addEventListener('input', recalcAll));

function libRecipe(o){
  const r = newRecipe();
  r.name=o.name; r.styleId=o.styleId;
  const st=STYLES.find(s=>s[0]===o.styleId);
  r.style = st ? st[0]+' '+st[1] : o.styleId;
  r.author='Főzde könyvtár';
  r.fermentables=o.f.map(x=>({name:x[0],amount:x[1],ebc:x[2],potential:x[3]}));
  r.hops=(o.h||[]).map(x=>({name:x[0],amount:x[1],alpha:x[2],use:x[3],time:x[4]}));
  r.yeasts=[{name:o.y[0],amount:1,attenuation:o.y[1]}];
  if(o.misc) r.misc=o.misc.map(x=>({name:x[0],amount:x[1],when:x[2]}));
  if(o.mash) r.mashSteps=o.mash.map(x=>({name:x[0],temp:x[1],time:x[2]}));
  if(o.ferm) r.fermSteps=o.ferm.map(x=>({name:x[0],temp:x[1],days:x[2]}));
  if(o.hst) r.hopstandTemp=o.hst;
  if(o.carb) r.carbonation=o.carb;
  if(o.notes) r.notes=o.notes;
  return r;
}

      <button class="btn small" data-lib="${i}">${t('Hozzáadás')}</button>

  }).join('');

      if(view.name==='list') render();
    };
  });

/* ---------- BeerXML import ---------- */
function importBeerXML(text){
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  if(doc.querySelector('parsererror')) throw new Error('hibás XML');
  const recs = [...doc.querySelectorAll('RECIPE')];
  const gv = (el,tag)=>{ const e = el.getElementsByTagName(tag)[0]; return e ? e.textContent.trim() : ''; };
  const gvd = (el,tag)=>{ /* csak közvetlen gyerek */ for(const ch of el.children){ if(ch.tagName===tag) return ch.textContent.trim(); } return ''; };
  let n=0;
  for(const R of recs){
    const r = newRecipe();
    r.name = gvd(R,'NAME') || t('Importált recept');
    const stEl = R.getElementsByTagName('STYLE')[0];
    const stName = stEl ? gv(stEl,'NAME') : '';
    const hit = STYLES.find(s=>stName.toLowerCase().includes(s[1].toLowerCase()));
    r.styleId = hit ? hit[0] : '';
    r.style = hit ? hit[0]+' '+hit[1] : (stName || t('Importált'));
    const bs=parseFloat(gvd(R,'BATCH_SIZE')); if(bs>0) r.equip.batchL=Math.round(bs*10)/10;
    const bt=parseFloat(gvd(R,'BOIL_TIME')); if(bt>0) r.equip.boilMin=Math.round(bt);
    const ef=parseFloat(gvd(R,'EFFICIENCY')); if(ef>0) r.equip.brewhouseEff=Math.round(ef);
    r.fermentables = [...R.getElementsByTagName('FERMENTABLE')].map(F=>({
      name: gv(F,'NAME'),
      amount: Math.round((parseFloat(gv(F,'AMOUNT'))||0)*100)/100,
      ebc: Math.round(((parseFloat(gv(F,'COLOR'))||2))*1.97*10)/10,
      potential: Math.round(parseFloat(gv(F,'YIELD'))||80)
    }));
    r.hops = [...R.getElementsByTagName('HOP')].map(H=>{
      const use=(gv(H,'USE')||'').toLowerCase();
      let u='boil';
      if(use.includes('dry')) u='dry';
      else if(use.includes('aroma')||use.includes('whirl')) u='hopstand';
      let time=Math.round(parseFloat(gv(H,'TIME'))||0);
      if(u==='dry') time=Math.max(1, Math.round(time/1440));
      return { name:gv(H,'NAME'), amount:Math.round((parseFloat(gv(H,'AMOUNT'))||0)*1000),
               alpha:Math.round((parseFloat(gv(H,'ALPHA'))||10)*10)/10, use:u, time };
    });
    const ys=[...R.getElementsByTagName('YEAST')];
    if(ys.length) r.yeasts = ys.map(Y=>({name:gv(Y,'NAME'), amount:1, attenuation:Math.round(parseFloat(gv(Y,'ATTENUATION'))||78)}));
    const ms=[...R.getElementsByTagName('MASH_STEP')];
    if(ms.length) r.mashSteps = ms.map(M=>({name:gv(M,'NAME')||'Lépés', temp:Math.round((parseFloat(gv(M,'STEP_TEMP'))||66)*10)/10, time:Math.round(parseFloat(gv(M,'STEP_TIME'))||60)}));
    const mi=[...R.getElementsByTagName('MISC')];
    if(mi.length) r.misc = mi.map(M=>({name:gv(M,'NAME'), amount:((parseFloat(gv(M,'AMOUNT'))||0)*1000).toFixed(0)+' g', when:'Forralás'}));
    recipes.push(r); n++;
  }
  return n;
}

/* ---------- export / import ---------- */
function exportAll(){
  const blob = new Blob([JSON.stringify({recipes, batches, settings}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fozde-receptek.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importAll(file){
  const fr = new FileReader();
  fr.onload = ()=>{
    const txt = fr.result;
    try{
      if(/^\s*</.test(txt) && txt.toUpperCase().includes('<RECIPE')){
        const n = importBeerXML(txt);
        scheduleSave(); render(); toast(n+t(' recept importálva (BeerXML)'));
        return;
      }
      const data = JSON.parse(txt);
      const incoming = Array.isArray(data) ? data : (data.recipes||[]);
      let n=0;
      for(const r of incoming){
        if(!r || !r.name) continue;
        if(!r.id || recipes.some(x=>x.id===r.id)) r.id='r'+Date.now()+Math.random().toString(36).slice(2,6);
        recipes.push(r); n++;
      }
      if(data.batches){
        for(const b of data.batches){
          if(!b || !b.id) continue;
          if(!batches.some(x=>x.id===b.id)) batches.push(b);
        }
      }
      if(data.settings) settings = {...DEFAULT_SETTINGS, ...data.settings};
      scheduleSave(); render(); toast(n+t(' recept betöltve'));
    }catch(e){ toast(t('Nem sikerült beolvasni a fájlt')); }
  };
  fr.readAsText(file);
}

let toastTimer=null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function render(){ view.name==='edit' ? renderEdit() : view.name==='batch' ? renderBatchEdit() : renderList(); }

document.getElementById('btn-import').onclick = ()=>document.getElementById('import-file').click();
document.getElementById('import-file').addEventListener('change', e=>{
  if(e.target.files[0]) importAll(e.target.files[0]);
  e.target.value='';
});

loadAll().then(()=>{
  applyUi();

  if(!storageOk) toast(t('Figyelem: a mentés nem érhető el, a receptek csak erre a munkamenetre maradnak meg'));
});
